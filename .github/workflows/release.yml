name: Release Glyph

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v2.1.3)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build

      - name: Package Windows Release (electron-builder)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Linux Release (electron-builder)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package macOS Release (electron-builder)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Releases (Windows)
        if: matrix.os == 'windows-latest' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.exe
          generate_release_notes: true

      - name: Publish to GitHub Releases (Linux)
        if: matrix.os == 'ubuntu-latest' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.AppImage
          generate_release_notes: true

      - name: Publish to GitHub Releases (macOS)
        if: matrix.os == 'macos-latest' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.dmg
            dist/*.zip
          generate_release_notes: true
