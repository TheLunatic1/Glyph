name: Auto Tag on Version Bump

# Triggers on every push to main (e.g. when you bump package.json version)
on:
  push:
    branches:
      - main
    paths:
      - 'package.json'   # Only run when package.json actually changes

jobs:
  check-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push the new tag

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so we can list all existing tags

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Check if tag v${{ steps.pkg.outputs.version }} already exists
        id: tag_check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist — will create it."
          fi

      - name: Create and push new tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"
