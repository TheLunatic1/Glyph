appId: com.glyph.app
productName: Glyph
directories:
  output: dist
  buildResources: build
files:
  - out
  - package.json
publish:
  provider: github
  owner: TheLunatic1
  repo: Glyph
releaseInfo:
  releaseNotesFile: RELEASE_NOTES.md
win:
  target:
    - nsis
    - portable
  icon: src/renderer/src/assets/logo.png
nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
mac:
  target: dmg
  icon: src/renderer/src/assets/logo.png
linux:
  target: AppImage
  icon: src/renderer/src/assets/logo.png
